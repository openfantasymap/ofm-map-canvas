<style>
    #mapCanvasContainer {
        display: flex;
        flex-direction: column;
        gap: 10px;
        height: 100%;
        width: 100%;
    }

    #inputHolder {
        display: flex;
        align-items: center;
        gap: 4px;
    }

    #mapPortal {
        flex: 1 1 auto;
        min-height: 500px;
        position: relative;
    }

    #mapCanvasZoomLevel,
    #mapCanvasLon,
    #mapCanvasLat {
        max-width: 120px;
    }

    .ofmc-spacer {
        flex: 1 1 10px;
    }

    .ofmc-label {
        padding: 0 4px;
        line-height: 26px;
    }
</style>

<form id="mapPortalForm" autocomplete="off">
    <div id="mapCanvasContainer">
        <div id="inputHolder">
            <input type="button" id="generateBtn" value="Generate Scene">
            <input type="hidden" id="mapData" value="">
            <span class="ofmc-spacer"></span>
            <span class="ofmc-label">Z:</span><input type="text" id="mapCanvasZoomLevel" placeholder="z" disabled>
            <span class="ofmc-label">X:</span><input type="text" id="mapCanvasLon" placeholder="x" disabled>
            <span class="ofmc-label">Y:</span><input type="text" id="mapCanvasLat" placeholder="y" disabled>
        </div>
        <div id="mapPortal"></div>
    </div>
</form>
